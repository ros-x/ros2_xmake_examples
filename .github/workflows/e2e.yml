name: E2E Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [jazzy]
    runs-on: ubuntu-latest
    container:
      image: ros:${{ matrix.ros_distro }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system and ROS dependencies
        run: |
          apt-get update && apt-get install -y curl python3-pip git libopencv-dev
          apt-get install -y --no-install-recommends \
            ros-${{ matrix.ros_distro }}-tf2-ros \
            ros-${{ matrix.ros_distro }}-tf2-geometry-msgs \
            ros-${{ matrix.ros_distro }}-cv-bridge \
            ros-${{ matrix.ros_distro }}-image-transport \
            ros-${{ matrix.ros_distro }}-rosbag2-cpp \
            ros-${{ matrix.ros_distro }}-rosbag2-transport \
            ros-${{ matrix.ros_distro }}-nav2-costmap-2d \
            ros-${{ matrix.ros_distro }}-hardware-interface \
            ros-${{ matrix.ros_distro }}-robot-state-publisher \
            ros-${{ matrix.ros_distro }}-joint-state-publisher \
            ros-${{ matrix.ros_distro }}-diagnostic-updater \
            ros-${{ matrix.ros_distro }}-example-interfaces

      - name: Install xlings and xmake
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          curl -fsSL https://raw.githubusercontent.com/d2learn/xlings/refs/heads/main/tools/other/quick_install.sh | bash
          export PATH="$HOME/.xlings/bin:$HOME/.xlings/subos/current/bin:$PATH"
          xlings install --verbose
          xmake --root --version
          echo "PATH=$HOME/.xlings/bin:$HOME/.xlings/subos/current/bin:$PATH" >> $GITHUB_ENV
          echo "XMAKE_ROOT=y" >> $GITHUB_ENV

      - name: Install colcon-xmake
        run: python3 -m pip install --break-system-packages git+https://github.com/ros-x/colcon-xmake.git

      - name: Clone ament_xmake
        run: |
          git clone https://github.com/ros-x/ament_xmake.git \
            $GITHUB_WORKSPACE/ament_xmake

      - name: Build ament_xmake
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon build --packages-select ament_xmake --event-handlers console_direct+

      - name: Build all packages
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon build --event-handlers console_direct+

      - name: Run tests
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon test --packages-select demo_xmake_cpp downstream_cmake_consumer --event-handlers console_direct+
          colcon test-result --verbose

      - name: Runtime smoke test
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          bash scripts/runtime_smoke.sh

      - name: Negative checks
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          bash scripts/e2e_negative_checks.sh
